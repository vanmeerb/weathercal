name: Update Weather Calendar

on:
  schedule:
    # Runs automatically every 24 hours (06:00 UTC)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allows you to manually trigger the script anytime via the GitHub UI

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Crucial permission allowing the bot to push updates back to your repo

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v8.1.0
      with:
        enable-cache: true
        cache-dependency-glob: |
          pyproject.toml
          uv.lock

    - name: Install dependencies
      run: uv sync

    - name: Run calendar generation script
      run: uv run src/weather_calendar.py

    - name: Prepare GitHub Pages artifact
      run: |
        mkdir -p public
        cp leuven_weather.ics public/leuven_weather.ics

    - name: Upload GitHub Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: public

    - name: Commit and Push the updated .ics file
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

        # Check if the file changed to prevent empty, spammy commits
        git add leuven_weather.ics
        if git diff --staged --quiet; then
            echo "No weather updates found. Skipping commit."
        else
            git commit -m "Automated update of leuven_weather.ics [skip ci]"
            git push
        fi

  deploy-pages:
    needs: build-and-update
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
